# ══════════════════════════════════════════════════════════════════════════════
# journald.conf.d — ZafafWorld journal retention override
#
# Install:  sudo cp infra/logrotate/journald-zafaf.conf \
#               /etc/systemd/journald.conf.d/zafaf.conf
#           sudo systemctl restart systemd-journald
#
# Verify:   journalctl --disk-usage
# ══════════════════════════════════════════════════════════════════════════════

[Journal]
# Maximum disk space all journals may use (hard limit).
SystemMaxUse=500M

# Target disk space to reclaim when journals are trimmed.
SystemKeepFree=200M

# Maximum size of a single journal file before rotation.
SystemMaxFileSize=50M

# Keep journal files for at most 30 days.
MaxRetentionSec=30day

# Compress journal data on disk.
Compress=yes

# Forward logs to syslog? No — journal is the canonical store here.
ForwardToSyslog=no
