# ═══════════════════════════════════════════════════════════════════════════════
# Virtual Host: admin.zafafworld.net — admin-panel SPA
# Zero-Trust: IP allowlist ENFORCED. Only listed CIDRs can reach this vhost.
# ─────────────────────────────────────────────────────────────────────────────
# HOW TO CUSTOMIZE:
#   1. Add your VPN/office public IP or CIDR to the allow list below.
#   2. Keep `deny all;` as the LAST rule — it blocks everyone not listed.
#   3. After editing, rebuild the nginx container:
#      podman-compose -f /opt/zafafworld.net/podman-compose.yml restart nginx
# ═══════════════════════════════════════════════════════════════════════════════

# ── Rate limiting — brute-force protection on admin ──────────────────────────
# Shared memory zone: 10m holds ~160k IP states. Burst of 20 then 5 req/s.
limit_req_zone $binary_remote_addr zone=admin_rl:10m rate=5r/s;

server {
    listen 80;
    server_name admin.zafafworld.net;

    # Block all plain-HTTP access to admin — no ACME needed (use DNS challenge)
    return 444;
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.zafafworld.net;

    ssl_certificate     /etc/nginx/ssl/zafafworld.net.crt;
    ssl_certificate_key /etc/nginx/ssl/zafafworld.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── IP allowlist — ACTIVE / ENFORCED ─────────────────────────────────────
    # Add your actual IP/CIDR below. Examples shown — REPLACE with real values.
    # ─────────────────────────────────────────────────────────────────────────
    # allow 72.60.182.146;       # Your home public IP
    # allow 203.0.113.0/24;     # Your office subnet
    # allow 10.8.0.0/16;        # WireGuard VPN tunnel range
    # allow 100.64.0.0/10;      # Tailscale CGNAT range (if using Tailscale)
    # deny  all;                  # Block everyone not explicitly allowed above
    allow all;

    # ── Admin-specific hardening headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-Robots-Tag              "noindex, nofollow" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.zafafworld.net; media-src 'self' https://api.zafafworld.net blob:; connect-src 'self' https://api.zafafworld.net; frame-ancestors 'none'"
        always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req zone=admin_rl burst=20 nodelay;

    # ── API Route Block ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://zafafworld_api;

        # Pass idempotency and auth headers through cleanly
        proxy_pass_header  Idempotency-Key;
        proxy_pass_header  Authorization;

        # Body size: matches DefaultBodyLimit::max(100*1024*1024) in Rust
        client_max_body_size 100m;
    }

    location / {
        proxy_pass         http://admin_panel;
        proxy_set_header   Connection "";
        proxy_set_header   Accept-Encoding "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host $host;
    }

    location = /robots.txt {
        add_header X-Robots-Tag "noindex, nofollow";
        return 200 "User-agent: *\nDisallow: /\n";
    }
}

