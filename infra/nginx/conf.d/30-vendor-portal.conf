# ═══════════════════════════════════════════════════════════════════════════════
# Virtual Host: vendor.zafafworld.net — vendor-portal SPA
# ═══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name vendor.zafafworld.net;
    # Let's Encrypt validation path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name vendor.zafafworld.net;

    ssl_certificate     /etc/nginx/ssl/zafafworld.net.crt;
    ssl_certificate_key /etc/nginx/ssl/zafafworld.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # Prevent clickjacking on partner dashboard
    add_header Content-Security-Policy   "frame-ancestors 'self'" always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=()" always;

    location / {
        proxy_pass         http://vendor-portal;
        client_max_body_size 200m;
        
        # Increase proxy buffers for large SvelteKit SSR Link headers
        proxy_buffer_size          16k;
        proxy_buffers              4 32k;
        proxy_busy_buffers_size    64k;

        proxy_set_header   Connection "";
        proxy_set_header   Accept-Encoding "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host $host;
    }

    location = /robots.txt { access_log off; log_not_found off; }
}
