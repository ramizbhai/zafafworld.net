# ═══════════════════════════════════════════════════════════════════════════════
# Virtual Host: zafafworld.net / www.zafafworld.net — client-web SPA
# ═══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name zafafworld.net www.zafafworld.net;
    # Let's Encrypt validation path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Lightweight healthcheck to verify SvelteKit is alive without triggering SSR
    location = /healthz {
        set $upstream_client_web "client-web:8081";
        proxy_pass http://$upstream_client_web/healthz;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        return 301 https://zafafworld.net$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name zafafworld.net www.zafafworld.net;

    ssl_certificate     /etc/nginx/ssl/zafafworld.net.crt;
    ssl_certificate_key /etc/nginx/ssl/zafafworld.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.zafafworld.net https://zafafworld.net blob:; media-src 'self' https://api.zafafworld.net blob:; connect-src 'self' https://api.zafafworld.net wss://api.zafafworld.net; frame-ancestors 'none'"
        always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Static SPA Proxy ─────────────────────────────────────────────────────
    location / {
        set $upstream_client_web "client-web:8081";
        proxy_pass         http://$upstream_client_web;
        proxy_set_header   Connection "";

        # Compress already-handled upstream; avoid double-gzip
        proxy_set_header   Accept-Encoding "";

        # Explicitly pass standard proxy headers
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host $host;
    }

    location /assets/uploads/ {
        proxy_pass http://minio:9000/zafafworld-media/assets/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Redirect /api calls from the main domain to the API subdomain
    location /api/ {
        return 301 https://api.zafafworld.net$request_uri;
    }

    # Robots / sitemap — serve directly via SvelteKit client-web
    location = /robots.txt  {
        set $upstream_client_web "client-web:8081";
        proxy_pass         http://$upstream_client_web$request_uri;
        proxy_set_header   Host            $host;
        access_log off;
        log_not_found off;
    }
    location = /sitemap.xml {
        set $upstream_client_web "client-web:8081";
        proxy_pass         http://$upstream_client_web/sitemap-index.xml;
        proxy_set_header   Host            $host;
        access_log off;
        log_not_found off;
    }
}
