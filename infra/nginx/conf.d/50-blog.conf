# ═══════════════════════════════════════════════════════════════════════════════
# Virtual Host: blog.zafafworld.net — WordPress CMS (headless admin only)
# External HTTPS termination with proxy to the zafaf-cms-nginx sidecar.
# ═══════════════════════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name blog.zafafworld.net;

    # Let's Encrypt validation path (keep parity with other vhosts)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: TLS-terminating reverse proxy → zafaf-cms-nginx sidecar ────────────
server {
    listen 443 ssl;
    http2 on;
    server_name blog.zafafworld.net;

    ssl_certificate     /etc/nginx/ssl/zafafworld.net.crt;
    ssl_certificate_key /etc/nginx/ssl/zafafworld.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers — WordPress admin context (SAMEORIGIN for iframe embeds)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy   "frame-ancestors 'self'" always;

    # ── Upstream body limit: WordPress media uploads ───────────────────────────
    client_max_body_size 64m;

    # ── Proxy to the internal CMS nginx sidecar ────────────────────────────────
    # zafaf-cms-nginx handles HTTP→FastCGI translation to zafaf-cms:9000.
    # We forward the original Host header so WordPress siteurl/home options
    # resolve correctly and so wp-login.php sets cookies for the right domain.
    location / {
        set $upstream_cms_nginx "zafaf-cms-nginx:80";
        proxy_pass         http://$upstream_cms_nginx;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;

        # Required for keepalive recycling (nginx.conf global default already
        # sets Connection "" but we make it explicit for this vhost).
        proxy_set_header   Connection        "";

        # WordPress admin can be slow on first load (plugin/theme checks)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
