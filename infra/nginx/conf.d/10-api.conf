limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:50m max_size=10g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name api.zafafworld.net;

    # Let's Encrypt validation path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS in production
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.zafafworld.net;

    rewrite_log on;
    error_log /var/log/nginx/error.log notice;
    resolver 10.89.0.1 valid=30s;

    ssl_certificate     /etc/nginx/ssl/zafafworld.net.crt;
    ssl_certificate_key /etc/nginx/ssl/zafafworld.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (63072000 = 2 years)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY    always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy   "default-src 'self'; frame-ancestors 'none';" always;

    # ── API Route Block ───────────────────────────────────────────────────────
    # All /api/v1/* requests proxied to the Axum backend via Unix Domain Socket.
    # This is the zero-TCP-overhead fast path: kernel IPC only.
    location /api/ {
        proxy_pass         http://zafafworld_api;

        # Pass idempotency and auth headers through cleanly
        proxy_pass_header  Idempotency-Key;
        proxy_pass_header  Authorization;

        # Body size: matches DefaultBodyLimit::max(200*1024*1024) in Rust
        client_max_body_size 200m;

        # Rate-limit API surface at ingress (supplement Rust rate limiter)
        limit_req zone=api_limit burst=60 nodelay;
    }

    location ~* ^/fallback-original/assets/uploads/(.+)_(thumb|card|medium|large)\.webp$ {
        internal;
        proxy_pass http://minio:9000/zafafworld-media/$1.webp;
        
        proxy_cache media_cache;
        proxy_cache_valid 200 206 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_key "$uri$is_args$args$http_range";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        
        # Indication of derivative fallback
        add_header X-Cache-Status "DERIVATIVE_FALLBACK_${upstream_cache_status}";
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-version-id;
        proxy_hide_header Server;

        # Fallback to local original if MinIO is offline during fallback
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @local_fallback;
    }

    # Serve static user uploads from MinIO as primary, with fallback to local volume
    location ~* ^/assets/uploads/(?<folder>[^/]+)/(?<filename>.+)$ {
        rewrite ^/assets/uploads/(.*)$ /zafafworld-media/assets/uploads/$1 break;
        proxy_pass http://minio:9000;
        
        # Enable caching for media assets
        proxy_cache media_cache;
        proxy_cache_valid 200 206 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        
        # HTTP Range and partial content support for video/audio streaming
        proxy_cache_key "$uri$is_args$args$http_range";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        
        # Cache status and control headers
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # Security/privacy: hide internal S3 headers
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-version-id;
        proxy_hide_header Server;
        
        # Intercept proxy errors to fallback to local volume or original derivative
        proxy_intercept_errors on;
        error_page 404 = /fallback-original$uri;
        error_page 500 502 503 504 = @local_fallback;
    }

    location @local_fallback {
        rewrite ^/assets/uploads/(.*)$ /$1 break;
        root /var/www/uploads;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        
        # Indication of local fallback
        add_header X-Cache-Status "LOCAL_FALLBACK";
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        access_log off;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        
        # CORS headers for frontend integration
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        
        # Static asset performance tuning & cache control (30 days)
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        access_log off;
    }

    # WebSocket Upgrade Path: bypassed from REST keepalive socket recycling
    location /api/v1/ws {
        proxy_pass         http://zafafworld_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        
        # Explicitly pass standard proxy headers
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Zero-Trust: Disable access log for WebSockets to prevent JWT token query parameters from leaking into access.log
        access_log off;
        
        # Disable generic timeouts to keep WebSocket active
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Max size for payload websocket messages
        client_max_body_size 1m;
    }

    # Health probe (no rate limit)
    location = /health {
        proxy_pass http://zafafworld_api;
        access_log off;
    }
}
