# ═══════════════════════════════════════════════════════════════════════════════
# /etc/nginx/nginx.conf — Pod-level edge router
# Optimized for high-throughput, low-latency UDS proxying.
# ═══════════════════════════════════════════════════════════════════════════════

user  nginx;

# One worker per logical CPU core — auto-detected.
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# ── Event loop tuning ─────────────────────────────────────────────────────────
events {
    # epoll is the most efficient I/O multiplexer on Linux.
    use           epoll;
    # Maximum simultaneous connections per worker.
    worker_connections  4096;
    # Accept all available connections in one syscall (reduces context switches).
    multi_accept  on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;        # Do not leak Nginx version in responses.

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml font/woff2;

    # ── Buffer tuning ─────────────────────────────────────────────────────────
    client_body_buffer_size     32k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # ── Upstream: Axum API via Unix Domain Socket ─────────────────────────────
    # No TCP stack involved — pure kernel IPC. Latency: ~microseconds.
    upstream zafafworld_api {
        server unix:/var/run/zafaf/zafaf.sock;
        keepalive 32;
    }

    # ── Upstream: vendor-portal SPA (port 8082) ───────────────────────────────
    upstream vendor-portal {
        server vendor-portal:8082;
        keepalive 16;
    }

    # ── Upstream: admin-panel SPA (port 8083) ─────────────────────────────────
    upstream admin_panel {
        server admin-panel:8083;
        keepalive 16;
    }

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection      "";          # Required for keepalive
    proxy_set_header        Host            $host;
    proxy_set_header        X-Real-IP       $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_connect_timeout   5s;
    proxy_read_timeout      120s;   # Raised from 30s: video ffmpeg processing can take >30s
    proxy_send_timeout      120s;   # Raised from 30s: large video body send to backend

    # Include virtual host shards
    include /etc/nginx/conf.d/*.conf;
}
