<!DOCTYPE html>
<html lang="%lang%" dir="%dir%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.webp" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="ZafafWorld — لوحة التحكم الإدارية المتكاملة" />
		<title>ZafafWorld - لوحة التحكم</title>
		<!-- Preconnect for Google Fonts performance -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<!-- Cairo: Arabic-first | Outfit: English headings | Inter: English body -->
		<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		<style>
			html, body {
				background-color: #0f172a;
				color: #f8fafc;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="background-color: #0f172a; color: #f8fafc; margin: 0;">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
