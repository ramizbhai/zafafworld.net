# ═══════════════════════════════════════════════════════════════════════════════
# podman-compose.yml — Zafaf World Production Stack
# Declarative, decoupled service discovery utilizing zafaf_network.
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.8"

networks:
  zafaf_network:
    driver: bridge
    ipam:
      driver: default

volumes:
  zafaf_uds_socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=777"

services:

  postgres:
    image: docker.io/postgres:16-alpine
    restart: always
    mem_limit: 4g
    cpus: 4
    networks:
      - zafaf_network
    environment:
      POSTGRES_DB:       "${POSTGRES_DB:-zafaf_world}"
      POSTGRES_USER:     "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}" # MANDATORY: empty value triggers postgres container boot failure
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - /var/lib/zafafworld/postgres:/var/lib/postgresql/data:Z
      - ./infra/postgres/zafaf-perf.conf:/etc/postgresql/conf.d/zafaf-perf.conf:ro,Z
    ports:
      - "127.0.0.1:5434:5432"
    command: postgres -c config_file=/etc/postgresql/conf.d/zafaf-perf.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    expose:
      - "5432"

  pgbouncer:
    image: docker.io/edoburu/pgbouncer:v1.25.1-p0
    restart: always
    mem_limit: 128m
    cpus: 0.5
    networks:
      - zafaf_network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: "${POSTGRES_USER:-postgres}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
      DB_NAME: "${POSTGRES_DB:-zafaf_world}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 55
      ADMIN_USERS: "${POSTGRES_USER:-postgres}"
      AUTH_TYPE: scram-sha-256
    expose:
      - "5432"
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $$DB_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: docker.io/redis:7-alpine
    restart: always
    mem_limit: 1g
    cpus: 1
    networks:
      - zafaf_network
    command: redis-server --appendonly yes
    volumes:
      - /var/lib/zafafworld/redis:/data:Z
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    expose:
      - "6379"

  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    mem_limit: 2g
    cpus: 2
    networks:
      - zafaf_network
    environment:
      MINIO_ROOT_USER:     "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - /var/lib/zafafworld/minio:/data:Z
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    expose:
      - "9000"
      - "9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  backend-migration:
    build:
      context: ./backend-rust
      dockerfile: Containerfile
      network: zafaf_network
      args:
        DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zafaf_world}"
    image: localhost/zafaf-backend:latest
    restart: "no"
    mem_limit: 1g
    cpus: 1
    user: "10001:10001"
    networks:
      - zafaf_network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RUST_LOG:     "${RUST_LOG:-info}"
      RUST_LOG_FORMAT: "${RUST_LOG_FORMAT:-json}"
      JWT_SECRET:   "${JWT_SECRET}"
      WHATSAPP_TOKEN: "${WHATSAPP_TOKEN:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      AFRAH_NOTIFICATION_PHONE: "${AFRAH_NOTIFICATION_PHONE:-}"
    command: ["run-migrations"]

  backend:
    build:
      context: ./backend-rust
      dockerfile: Containerfile
      network: zafaf_network
      args:
        DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zafaf_world}"
    image: localhost/zafaf-backend:latest
    restart: always
    mem_limit: 1.5g
    cpus: 2
    user: "10001:10001"
    networks:
      - zafaf_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-migration:
        condition: service_completed_successfully
    environment:
      BIND_MODE:    uds
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      REDIS_URL:    "redis://redis:6379"
      JWT_SECRET:   "${JWT_SECRET}" # MANDATORY: backend will fail to validate and panic if empty or short
      RUST_LOG:     "${RUST_LOG:-info}"
      RUST_LOG_FORMAT: "${RUST_LOG_FORMAT:-json}" # json format for structured log aggregation
      PORT:         "8080"
      WHATSAPP_TOKEN: "${WHATSAPP_TOKEN:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      AFRAH_NOTIFICATION_PHONE: "${AFRAH_NOTIFICATION_PHONE:-}"
      SMTP_HOST:    "${SMTP_HOST}"
      SMTP_PORT:    "${SMTP_PORT}"
      SMTP_USERNAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-ZafafWorld}"
      SMTP_TLS_MODE: "${SMTP_TLS_MODE:-}"
      APP_ENVIRONMENT: "production"
      FRONTEND_URL: "${FRONTEND_URL:-https://zafafworld.net}"
      WP_HEADLESS_BASE_URL: "${WP_HEADLESS_BASE_URL:-https://cms.zafafworld.net}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://zafafworld.net,https://vendor.zafafworld.net,https://admin.zafafworld.net}"
      ADMIN_INITIAL_EMAIL: "${ADMIN_INITIAL_EMAIL:-}" # first-boot DB seed
      ADMIN_INITIAL_PASSWORD: "${ADMIN_INITIAL_PASSWORD:-}" # first-boot DB seed
      MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
      MINIO_BUCKET:   "${MINIO_BUCKET}"
      MINIO_APP_USER: "${MINIO_APP_USER}"
      MINIO_APP_PASSWORD: "${MINIO_APP_PASSWORD}"
      MINIO_ROOT_PREFIX: "${MINIO_ROOT_PREFIX:-assets/uploads}"
    security_opt:
      - label:disable        # Allow UDS socket bind on tmpfs without SELinux confinement
    extra_hosts:
      - "cms.zafafworld.net:10.89.0.1"
    volumes:
      - zafaf_uds_socket:/var/run/zafaf:z
      - /var/lib/zafafworld/uploads:/app/assets/uploads:z
    healthcheck:
      # Probe via /proc/net/unix (kernel namespace view) — avoids SELinux label
      # mismatch caused by the shared :Z volume being relabeled by the nginx
      # container. If the socket file path exists in the kernel socket table the
      # backend process is alive and accepting connections.
      test: ["CMD-SHELL", "grep -q 'zafaf.sock' /proc/net/unix || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  client-web:
    build:
      context: ./client-web
      dockerfile: Containerfile
    image: localhost/zafaf-client-web:latest
    restart: always
    mem_limit: 2g
    cpus: 2
    # user managed by Containerfile: USER zafaf (addgroup -S zafaf)
    networks:
      - zafaf_network
    environment:
      PUBLIC_API_URL: "${PUBLIC_API_URL:-https://api.zafafworld.net}"
      PUBLIC_WS_URL: "${PUBLIC_WS_URL:-wss://api.zafafworld.net}"
      ORIGIN: "${PUBLIC_CLIENT_URL:-https://zafafworld.net}"
      BODY_SIZE_LIMIT: "209715200"
      REDIS_URL: "redis://redis:6379"
      NODE_EXTRA_CA_CERTS: "${NODE_EXTRA_CA_CERTS:-/etc/nginx/ssl/zafafworld.net.crt}"
      NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"
      PROTOCOL_HEADER: "x-forwarded-proto"
      HOST_HEADER: "x-forwarded-host"
    extra_hosts:
      - "api.zafafworld.net:host-gateway"
      - "zafafworld.net:host-gateway"
      - "vendor.zafafworld.net:host-gateway"
      - "admin.zafafworld.net:host-gateway"
    volumes:
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 2
      start_period: 3s
    expose:
      - "8081"

  vendor-portal:
    build:
      context: ./vendor-portal
      dockerfile: Containerfile
    image: localhost/zafaf-vendor-portal:latest
    restart: always
    mem_limit: 1g
    cpus: 1
    # user managed by Containerfile: USER zafaf (addgroup -S zafaf)
    networks:
      - zafaf_network
    environment:
      PUBLIC_API_URL: "${PUBLIC_API_URL:-https://api.zafafworld.net}"
      PUBLIC_WS_URL: "${PUBLIC_WS_URL:-wss://api.zafafworld.net}"
      ORIGIN: "${PUBLIC_VENDOR_URL:-https://vendor.zafafworld.net}"
      BODY_SIZE_LIMIT: "209715200"
      REDIS_URL: "redis://redis:6379"
      NODE_EXTRA_CA_CERTS: "${NODE_EXTRA_CA_CERTS:-/etc/nginx/ssl/zafafworld.net.crt}"
      NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"
      PROTOCOL_HEADER: "x-forwarded-proto"
      HOST_HEADER: "x-forwarded-host"
    extra_hosts:
      - "api.zafafworld.net:host-gateway"
      - "zafafworld.net:host-gateway"
      - "vendor.zafafworld.net:host-gateway"
      - "admin.zafafworld.net:host-gateway"
    volumes:
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8082/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "8082"

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Containerfile
    image: localhost/zafaf-admin-panel:latest
    restart: always
    mem_limit: 512m
    cpus: 0.5
    # user managed by Containerfile: USER zafaf (addgroup -S zafaf)
    networks:
      - zafaf_network
    environment:
      PUBLIC_API_URL: "${PUBLIC_API_URL:-https://api.zafafworld.net}"
      ORIGIN: "${PUBLIC_ADMIN_URL:-https://admin.zafafworld.net}"
      BODY_SIZE_LIMIT: "209715200"
      REDIS_URL: "redis://redis:6379"
      NODE_EXTRA_CA_CERTS: "${NODE_EXTRA_CA_CERTS:-/etc/nginx/ssl/zafafworld.net.crt}"
      NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"
      PROTOCOL_HEADER: "x-forwarded-proto"
      HOST_HEADER: "x-forwarded-host"
    extra_hosts:
      - "api.zafafworld.net:host-gateway"
      - "zafafworld.net:host-gateway"
      - "vendor.zafafworld.net:host-gateway"
      - "admin.zafafworld.net:host-gateway"
    volumes:
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "8083"

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Containerfile
    image: localhost/zafaf-nginx:latest
    restart: always
    mem_limit: 512m
    cpus: 2
    security_opt:
      - label:disable
    depends_on:
      backend:
        condition: service_healthy
      client-web:
        condition: service_healthy
      vendor-portal:
        condition: service_healthy
      admin-panel:
        condition: service_healthy
    networks:
      zafaf_network:
        aliases:
          - api.zafafworld.net
          - cms.zafafworld.net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - zafaf_uds_socket:/var/run/zafaf:z
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro,Z
      - ./infra/nginx/logs:/var/log/nginx:Z
      - /var/lib/zafafworld/uploads:/var/www/uploads:ro,z
    healthcheck:
      # Test actual HTTP connectivity (not just config syntax) to verify
      # the full proxy chain is functional after container start.
      test: ["CMD-SHELL", "curl -sf -H 'Host: zafafworld.net' http://127.0.0.1:80/healthz > /dev/null || wget --no-verbose --tries=1 --spider --header='Host: zafafworld.net' http://127.0.0.1:80/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s


