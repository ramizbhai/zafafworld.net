<!doctype html>
<html lang="%paraglide.lang%" dir="%paraglide.textDirection%">
	<head>
		<script>
			window.addEventListener("error", (e) => fetch("/__log_error", { method: "POST", body: JSON.stringify({ error: e.message, stack: e.error?.stack, filename: e.filename, lineno: e.lineno }) }));
			window.addEventListener("unhandledrejection", (e) => fetch("/__log_error", { method: "POST", body: JSON.stringify({ error: e.reason?.message, stack: e.reason?.stack }) }));
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.webp" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#C9A96E" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&family=Playfair+Display:wght@400;600&display=swap" />
		<style>
			html, body {
				background-color: #FDFAF6;
				color: #2D2620;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="overflow-x-hidden" style="background-color: #FDFAF6; color: #2D2620; margin: 0;">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
