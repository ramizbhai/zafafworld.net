##
## cms-internal.conf — zafaf-cms-nginx sidecar config
##
## This file is mounted read-only into the zafaf-cms-nginx container.
## It translates HTTP → FastCGI (to zafaf-cms:9000) inside zafaf_network.
## It is NOT the public TLS-terminating server — that is handled by the
## external `nginx` service with a blog.zafafworld.net server block that
## proxy_passes to http://zafaf-cms-nginx.
##
## Security posture:
##   - No host port is mapped; this server is only reachable from inside the
##     Podman network (by other containers) or via the external nginx proxy.
##   - xmlrpc.php is blocked at the web-server layer (not just PHP).
##   - Any public WordPress front-end URL that doesn't match a whitelisted
##     location is redirected to the main site's /discover page.
##
## Fix (2026-07-06): Replaced the broken try_files-only /wp-admin/ location
## with a FastCGI-aware block. Using `^~` with try_files $uri $uri/
## /wp-admin/index.php caused nginx to serve index.php as a raw static file
## (Content-Type: application/octet-stream) instead of passing it to PHP-FPM,
## because the ^~ modifier stops the regex location ~ \.php$ from matching.
## The fix uses a nested location so .php requests within /wp-admin/ are
## explicitly handed to FastCGI via the shared PHP handler.
##

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Set dynamic resolver variable
    set $upstream_cms zafaf-cms;

    # ── WordPress Admin ────────────────────────────────────────────────────────
    # Priority: ^~ beats regex, so we explicitly handle PHP inside this block
    # with a nested location to avoid the static-file fallback trap.
    location ^~ /wp-admin/ {
        # Serve real static assets (CSS/JS/images) first; fall back to index.php
        try_files $uri $uri/ /wp-admin/index.php?$args;

        # Nested location: catch any .php file inside /wp-admin/ and execute it
        location ~ \.php$ {
            set $upstream_cms zafaf-cms;
            fastcgi_pass         $upstream_cms:9000;
            fastcgi_index        index.php;
            include              fastcgi_params;
            fastcgi_param        SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 120s;
            fastcgi_buffers      16 16k;
            fastcgi_buffer_size  32k;
        }
    }

    location = /wp-login.php {
        set $upstream_cms zafaf-cms;
        fastcgi_pass   $upstream_cms:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
    }

    # ── WordPress REST API (internal callers: SvelteKit, webhook verification) ─
    location ^~ /wp-json/ {
        try_files $uri /index.php?$args;
    }

    # ── WordPress static assets ────────────────────────────────────────────────
    location ^~ /wp-content/ {
        try_files $uri =404;
    }

    location ^~ /wp-includes/ {
        try_files $uri =404;
    }

    # ── Block XML-RPC entirely (web-server layer, not just PHP) ────────────────
    location = /xmlrpc.php {
        return 403;
    }

    # ── Block WordPress sitemap XML (served via zafafworld.net SvelteKit instead)
    location ~* ^/wp-sitemap.*\.xml$ {
        return 404;
    }

    # ── All other public WordPress front-end routes ────────────────────────────
    # WordPress's front-end is fully disabled. The PHP-level backstop
    # (disable-frontend.php mu-plugin) catches anything that slips through.
    location / {
        return 301 https://zafafworld.net/discover;
    }

    # ── PHP handler (shared by all PHP-passing locations above) ───────────────
    location ~ \.php$ {
        set $upstream_cms zafaf-cms;
        fastcgi_pass         $upstream_cms:9000;
        fastcgi_index        index.php;
        include              fastcgi_params;
        fastcgi_param        SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
    }
}
